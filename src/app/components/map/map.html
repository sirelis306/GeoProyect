<div class="map-wrapper" style="width: 100%; height: 100vh; position: relative;">
  <div #mapContainer id="map" style="width: 100%; height: 100%;"></div>
  <app-totales></app-totales>

  <!-- Leyenda: Estados activos (cuando Capa 2 / Operaciones está activa) -->
  <div class="map-legend-overlay" *ngIf="gis.capasVisibles().operaciones && gis.getEstadosConDatos().length > 0">
    <div class="legend-header">ESTADOS ACTIVOS</div>
    <div class="legend-body">
      <div class="legend-item-map" *ngFor="let est of gis.getEstadosConDatos()">
        <span class="color-indicator" [style.backgroundColor]="est.color"></span>
        <span class="region-label">{{ est.nombre }}</span>
      </div>
    </div>
  </div>

  <!-- Leyenda: Regiones activas (solo Capa 1, sin operaciones) -->
  <div class="map-legend-overlay" *ngIf="gis.capasVisibles().regiones && !gis.capasVisibles().operaciones">
    <div class="legend-header">REGIONES ACTIVAS</div>
    <div class="legend-body">
      <div class="legend-item-map" *ngFor="let region of gis.getRegionesConColores()">
        <span class="color-indicator" [style.backgroundColor]="region.color"></span>
        <span class="region-label">{{ region.nombre }}</span>
      </div>
    </div>
  </div>

</div>
