<div class="page-container">
  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a routerLink="/usuarios" class="breadcrumb-link">Usuarios</a>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-current">Crear Usuario</span>
  </div>

  <!-- Panel de éxito: muestra la contraseña temporal -->
  <div *ngIf="passwordTemporal" class="success-panel">
    <div class="success-icon"><i class="fas fa-check-circle"></i></div>
    <div class="success-content">
      <div class="success-title">¡Usuario creado exitosamente!</div>
      <p class="success-desc">Comparte esta contraseña temporal con el usuario. Deberá cambiarla en su primer acceso.
      </p>
      <div class="password-display">
        <span class="password-label">Contraseña temporal:</span>
        <code class="password-value">{{ passwordTemporal }}</code>
      </div>
    </div>
    <button class="btn btn-primary" (click)="cerrarYRegresar()">
      Volver a Usuarios <i class="fas fa-arrow-right"></i>
    </button>
  </div>

  <!-- Formulario (se oculta tras crear) -->
  <div class="form-card" *ngIf="!passwordTemporal">

    <div *ngIf="showErrors && errorMsg" class="error-message-box">
      <i class="fas fa-exclamation-circle"></i> {{ errorMsg }}
    </div>
    <div *ngIf="errorMsg && !showErrors" class="error-message-box">
      <i class="fas fa-exclamation-circle"></i> {{ errorMsg }}
    </div>

    <form #userForm="ngForm" (ngSubmit)="guardar(userForm)">
      <div class="form-grid">
        <!-- Fila 1 -->
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Primer Nombre *" [(ngModel)]="user.primerNombre"
            name="primerNombre" required />
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Segundo Nombre" [(ngModel)]="user.segundoNombre"
            name="segundoNombre" />
        </div>

        <!-- Fila 2 -->
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Primer Apellido *" [(ngModel)]="user.primerApellido"
            name="primerApellido" required />
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Segundo Apellido" [(ngModel)]="user.segundoApellido"
            name="segundoApellido" />
        </div>

        <!-- Fila 3 -->
        <div class="form-group form-group-split">
          <div class="flex-1">
            <ng-select class="select-simple" [(ngModel)]="user.tipoDocumento" name="tipoDocumento" required
              placeholder="Tipo *" [clearable]="false" [searchable]="false" [items]="tiposDocumento">
            </ng-select>
          </div>
          <input type="text" class="input-modern flex-2" placeholder="# Documento *" [(ngModel)]="user.documento"
            name="documento" required />
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Fecha Nacimiento *" onfocus="(this.type='date')"
            onblur="if(!this.value) this.type='text'" [(ngModel)]="user.fechaNacimiento" name="fechaNacimiento"
            required />
        </div>

        <!-- Fila 4 -->
        <div class="form-group">
          <ng-select class="select-simple" [(ngModel)]="user.pais" name="pais" required placeholder="País *"
            [clearable]="false" [searchable]="false" [items]="paises">
          </ng-select>
        </div>
        <div class="form-group">
          <ng-select class="select-simple" [(ngModel)]="user.estado" name="estado" required (change)="onEstadoChange()"
            placeholder="Estado *" [clearable]="false" [searchable]="true" [items]="estados">
          </ng-select>
        </div>

        <!-- Fila 5 -->
        <div class="form-group">
          <ng-select class="select-simple" [(ngModel)]="user.ciudad" name="ciudad" required [disabled]="!user.estado"
            placeholder="Ciudad *" [clearable]="false" [searchable]="true" [items]="ciudadesDisponibles">
          </ng-select>
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Dirección *" [(ngModel)]="user.direccion"
            name="direccion" required />
        </div>

        <!-- Fila 6 -->
        <div class="form-group">
          <ng-select class="select-simple" [(ngModel)]="user.sexo" name="sexo" required placeholder="Sexo *"
            [clearable]="false" [searchable]="false" [items]="sexos" bindLabel="label" bindValue="value">
          </ng-select>
        </div>
        <div class="form-group">
          <input type="email" class="input-modern" placeholder="Email *" [(ngModel)]="user.email" name="email"
            required />
        </div>

        <!-- Fila 7 - Cargo -->
        <div class="form-group" style="grid-column: span 2;">
          <div style="width: calc(50% - 20px);">
            <ng-select class="select-simple" [(ngModel)]="user.cargo" name="cargo" required placeholder="Cargo *"
              [clearable]="false" [searchable]="true" [items]="cargos" bindLabel="label" bindValue="value">
            </ng-select>
          </div>
        </div>
      </div>

      <!-- Sección de Roles -->
      <div class="roles-section">
        <div class="roles-title">Roles</div>
        <div class="roles-grid">
          <!-- Solo el Super Admin puede asignar estos roles -->
          <label class="checkbox-label" *ngIf="esSuperAdmin">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.rol_super_administrador"
              name="role_super_admin" />
            Súper Administrador
          </label>
          <label class="checkbox-label" *ngIf="esSuperAdmin">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.rol_administrador"
              name="role_admin" />
            Administrador
          </label>
          <!-- Todos pueden asignar estos -->
          <label class="checkbox-label">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.rol_analista"
              name="rol_analista" />
            Analista
          </label>
          <label class="checkbox-label">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.rol_regular" name="rol_regular" />
            Regular
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="regresar()">
          Regresar <i class="fas fa-home"></i>
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="cargando">
          <span *ngIf="!cargando">Guardar <i class="fas fa-save"></i></span>
          <span *ngIf="cargando"><i class="fas fa-spinner fa-spin"></i> Guardando...</span>
        </button>
      </div>
    </form>
  </div>
</div>
