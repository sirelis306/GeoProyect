<div class="page-container">
  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a routerLink="/usuarios" class="breadcrumb-link">Usuarios</a>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-current">Crear Usuario</span>
  </div>

  <div class="form-card">
    <div *ngIf="showErrors && !userForm.valid" class="error-message-box">
      <i class="fas fa-exclamation-circle"></i> Por favor complete todos los campos requeridos marcados con (*).
    </div>

    <form #userForm="ngForm" (ngSubmit)="guardar(userForm)">
      <div class="form-grid">
        <!-- Fila 1 -->
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Primer Nombre *" [(ngModel)]="user.primerNombre"
            name="primerNombre" required />
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Segundo Nombre *" [(ngModel)]="user.segundoNombre"
            name="segundoNombre" required />
        </div>

        <!-- Fila 2 -->
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Primer Apellido *" [(ngModel)]="user.primerApellido"
            name="primerApellido" required />
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Segundo Apellido" [(ngModel)]="user.segundoApellido"
            name="segundoApellido" />
        </div>

        <!-- Fila 3 -->
        <div class="form-group form-group-split">
          <div class="flex-1">
            <ng-select class="ng-modern" [(ngModel)]="user.tipoDocumento" name="tipoDocumento" required
              placeholder="Tipo *" [clearable]="false" [searchable]="false" [items]="tiposDocumento">
            </ng-select>
          </div>
          <input type="text" class="input-modern flex-2" placeholder="# Documento *" [(ngModel)]="user.documento"
            name="documento" required />
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Fecha Nacimiento *" onfocus="(this.type='date')"
            onblur="if(!this.value) this.type='text'" [(ngModel)]="user.fechaNacimiento" name="fechaNacimiento"
            required />
        </div>

        <!-- Fila 4 -->
        <div class="form-group">
          <ng-select class="ng-modern" [(ngModel)]="user.pais" name="pais" required placeholder="País *"
            [clearable]="false" [searchable]="false" [items]="paises">
          </ng-select>
        </div>
        <div class="form-group">
          <ng-select class="ng-modern " [(ngModel)]="user.estado" name="estado" required (change)="onEstadoChange()"
            placeholder="Estado *" [clearable]="false" [searchable]="true" [items]="estados">
          </ng-select>
        </div>

        <!-- Fila 5 -->
        <div class="form-group">
          <ng-select class="ng-modern" [(ngModel)]="user.ciudad" name="ciudad" required [disabled]="!user.estado"
            placeholder="Ciudad *" [clearable]="false" [items]="ciudadesDisponibles">
          </ng-select>
        </div>
        <div class="form-group">
          <input type="text" class="input-modern" placeholder="Dirección *" [(ngModel)]="user.direccion"
            name="direccion" required />
        </div>

        <!-- Fila 6 -->
        <div class="form-group">
          <ng-select class="ng-modern" [(ngModel)]="user.sexo" name="sexo" required placeholder="Sexo *"
            [clearable]="false" [searchable]="false" [items]="sexos" bindLabel="label" bindValue="value">
          </ng-select>
        </div>
        <div class="form-group">
          <input type="email" class="input-modern" placeholder="Email *" [(ngModel)]="user.email" name="email"
            required />
        </div>

        <!-- Fila 7 -->
        <div class="form-group" style="display:none;"></div>

        <div class="form-group" style="grid-column: span 2;">
          <div style="width: calc(50% - 20px);">
            <ng-select class="ng-modern" [(ngModel)]="user.cargo" name="cargo" required placeholder="Cargo *"
              [clearable]="false" [searchable]="true" [items]="cargos" bindLabel="label" bindValue="value">
            </ng-select>
          </div>
        </div>
      </div>

      <div class="roles-section">
        <div class="roles-title">Roles</div>
        <div class="roles-grid">
          <label class="checkbox-label">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.ROLE_ADMINISTRADOR"
              name="role_admin" />
            Administrador
          </label>
          <label class="checkbox-label">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.ROLE_ANALISTA"
              name="role_analista" />
            Analista
          </label>
          <label class="checkbox-label">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.ROLE_REGULAR"
              name="role_regular" />
            Regular
          </label>
          <label class="checkbox-label">
            <input type="checkbox" class="circular-checkbox" [(ngModel)]="user.roles.ROLE_SUPER_ADMINISTRADOR"
              name="role_super_admin" />
            Súper Administrador
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="regresar()">
          Regresar <i class="fas fa-home"></i>
        </button>
        <button type="submit" class="btn btn-primary">
          Guardar <i class="fas fa-save"></i>
        </button>
      </div>
    </form>
  </div>
</div>
