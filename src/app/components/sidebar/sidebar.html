<div class="sidebar">
  <div class="brand">
    <div class="brand-icon">
      <i class="fas fa-map"></i> <!-- Usa FontAwesome para el ícono de mapa -->
    </div>
    <div class="brand-text">
      <strong>GeoProyect</strong>
    </div>
  </div>
  <hr class="header-divider">
  <div class="section-label">CONTROL DE CAPAS</div>
  <div class="layer-list">
    <!-- Capa 1: Regiones -->
    <button class="layer-item" 
            [class.active]="gis.capasVisibles().regiones"
            (click)="toggle('regiones')">
      <span class="dot orange"></span> Capa 1: Regiones
    </button>

    <!-- Leyenda de Regiones (solo visible cuando Capa 1 está activa) -->
    <div class="legend-container" *ngIf="gis.capasVisibles().regiones">
      <div class="section-label">REGIONES CON DATOS</div>
      <div class="legend-grid">
        <div class="legend-item" *ngFor="let region of regionesFiltradas">
          <span class="color-box" [style.backgroundColor]="region.color"></span>
          <span class="region-name">{{ region.nombre }}</span>
        </div>
      </div>
    </div>
    
    <!-- Capa 2: Operaciones (principal) -->
    <button class="layer-item" 
            [class.active]="gis.capasVisibles().operaciones"
            (click)="toggle('operaciones')">
      <span class="dot blue"></span> Capa 2: Operaciones
    </button>
  
    <!-- Subcapas de Operaciones (solo visibles cuando Capa 2 está activa) -->
    <div class="subcapas-container" *ngIf="gis.capasVisibles().operaciones">
      <div class="section-label">TIPO DE ELEMENTO</div>
      
      <!-- Grupo: Radio Bases -->
      <div class="subcapa-group">
        <button class="subcapa-item" [class.active]="gis.capasVisibles().detalleCap2 === 'antenas'" (click)="setDetalle('antenas')">
          <span class="dot" style="background: #FF1493;"></span> Radio Bases (Antenas)
        </button>
        <button class="add-item-btn" (click)="abrirModal('antenas')">+</button>
      </div>

      <!-- Grupo: Abonados -->
      <div class="subcapa-group">
        <button class="subcapa-item" [class.active]="gis.capasVisibles().detalleCap2 === 'abonados'" (click)="setDetalle('abonados')">
          <span class="dot" style="background: #00BFFF;"></span> Abonados
        </button>
        <button class="add-item-btn" (click)="abrirModal('abonados')">+</button>
      </div>

      <!-- Grupo: Oficinas -->
      <div class="subcapa-group">
        <button class="subcapa-item" [class.active]="gis.capasVisibles().detalleCap2 === 'oficinas'" (click)="setDetalle('oficinas')">
          <span class="dot" style="background: #32CD32;"></span> Oficinas Comerciales
        </button>
        <button class="add-item-btn" (click)="abrirModal('oficinas')">+</button>
      </div>

      <!-- Grupo: Agentes -->
      <div class="subcapa-group">
        <button class="subcapa-item" [class.active]="gis.capasVisibles().detalleCap2 === 'agentes'" (click)="setDetalle('agentes')">
          <span class="dot" style="background: #FF8C00;"></span> Agentes Autorizados
        </button>
        <button class="add-item-btn" (click)="abrirModal('agentes')">+</button>
      </div>
    </div>
  </div>
</div>

 <!-- Overlay del Modal -->
    <div class="modal-overlay"  [class.active]="mostrarForm">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h3>Agregar Nuevo</h3>
            <small class="text-blue">{{ tipoEdicion | titlecase }}</small>
          </div>
          <button class="close-x" (click)="mostrarForm = false">&times;</button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" [(ngModel)]="nuevoItem.nombre" placeholder="">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Estado</label>
              <ng-select 
                [(ngModel)]="nuevoItem.estado" 
                [items]="listaEstados"
                [clearable]="false"
                [searchable]="true"
                placeholder="Seleccione un estado"
                class="custom-ng-select">
              </ng-select>
            </div>
            <div class="form-group">
              <label>Región</label>
              <input type="text" [value]="obtenerRegion(nuevoItem.estado)" readonly placeholder="Se asigna solo">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Longitud</label>
              <input type="number" [(ngModel)]="nuevoItem.longitud">
            </div>
            <div class="form-group">
              <label>Latitud</label>
              <input type="number" [(ngModel)]="nuevoItem.latitud">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Detalle</label>
              <input type="text" [(ngModel)]="nuevoItem.detalle" placeholder="">
            </div>
            <div class="form-group" *ngIf="tipoEdicion === 'antenas'">
              <label>Estado de Actividad</label>
              <select [(ngModel)]="nuevoItem.actividad" class="custom-select">
                <option value="Operativa">Operativa</option>
                <option value="Mantenimiento">Mantenimiento</option>
                <option value="Falla">Falla</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-cancel" (click)="mostrarForm = false">Cancelar</button>
          <button class="btn-save" (click)="guardar()">Agregar Elemento</button>
        </div>
      </div>
    </div>
