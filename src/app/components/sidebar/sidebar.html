<div class="sidebar">
  <div class="sidebar-main-content">
    <div class="brand">
      <div class="brand-icon">
        <i class="fas fa-map"></i>
      </div>
      <div class="brand-text" *ngIf="!gis.sidebarColapsado()">
        <strong>STERIÁ</strong>
      </div>
    </div>
    <hr class="header-divider">

    <div class="section-label" *ngIf="esAdmin && !gis.sidebarColapsado()">ADMIN</div>
    <button class="layer-item" *ngIf="esAdmin" routerLink="/usuarios" routerLinkActive="active"
      [title]="gis.sidebarColapsado() ? 'Gestión de Usuarios' : ''">
      <i class="fas fa-users layer-icon" style="color: #3240A5;"></i>
      <span *ngIf="!gis.sidebarColapsado()">Gestión de Usuarios</span>
    </button>

    <div class="section-label" *ngIf="!gis.sidebarColapsado()">MAPA</div>
    <button class="layer-item" routerLink="/mapa" routerLinkActive="active"
      [title]="gis.sidebarColapsado() ? 'Visualización General' : ''">
      <i class="fas fa-globe-americas layer-icon" style="color: #3240A5;"></i>
      <span *ngIf="!gis.sidebarColapsado()">Visualización General</span>
    </button>

    <ng-container *ngIf="router.url === '/mapa'">
      <div class="section-label" *ngIf="!gis.sidebarColapsado()">CONTROL DE CAPAS</div>
      <div class="layer-list">
        <!-- Capa 1: Regiones -->
        <button class="layer-item" [class.active]="gis.capasVisibles().regiones" (click)="toggle('regiones')"
          [title]="gis.sidebarColapsado() ? 'Regiones' : ''">
          <i class="fas fa-layer-group layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Regiones</span>
        </button>

        <!-- Selección de elemento para Regiones (Solo si regiones está ON y operaciones está OFF) -->
        <div class="subcapas-container mini" *ngIf="gis.capasVisibles().regiones && !gis.capasVisibles().operaciones && !gis.sidebarColapsado()">
          <div class="section-label">MOSTRAR TOTAL DE:</div>
          <div class="tipo-selector-grid">
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleCap1 === 'antenas'" (click)="setDetalleCapa1('antenas')" title="Radio Bases">
              <i class="fas fa-broadcast-tower"></i>
            </button>
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleCap1 === 'abonados'" (click)="setDetalleCapa1('abonados')" title="Abonados">
              <i class="fas fa-user-check"></i>
            </button>
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleCap1 === 'oficinas'" (click)="setDetalleCapa1('oficinas')" title="Oficinas">
              <i class="fas fa-building"></i>
            </button>
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleCap1 === 'agentes'" (click)="setDetalleCapa1('agentes')" title="Agentes">
              <i class="fas fa-store"></i>
            </button>
          </div>
        </div>

        <!-- Capa 2: Operaciones (principal) -->
        <button class="layer-item" [class.active]="gis.capasVisibles().operaciones" (click)="toggle('operaciones')"
          [title]="gis.sidebarColapsado() ? 'Operaciones' : ''">
          <i class="fas fa-network-wired layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Operaciones</span>
        </button>

        <!-- Subcapas de Operaciones (solo visibles cuando Capa 2 está activa) -->
        <div class="subcapas-container" *ngIf="gis.capasVisibles().operaciones">
          <div class="section-label" *ngIf="!gis.sidebarColapsado()">TIPO DE ELEMENTO</div>

          <!-- Grupo: Radio Bases -->
          <div class="subcapa-group">
            <button class="subcapa-item" [class.active]="isActive('antenas')"
              (click)="setDetalle('antenas')" [title]="gis.sidebarColapsado() ? 'Radio Bases' : ''">
              <i class="fas fa-broadcast-tower layer-icon" style="color: #FF1493;"></i>
              <span *ngIf="!gis.sidebarColapsado()">Radio Bases</span>
            </button>
            <button class="add-item-btn" (click)="abrirModal('antenas')" *ngIf="!gis.sidebarColapsado()">+</button>
          </div>

          <!-- Buscador de Radio Bases -->
          <div class="subcapa-search" *ngIf="isActive('antenas') && !gis.sidebarColapsado()">
            <div class="search-input-wrapper">
              <i class="fas fa-search search-icon"></i>
              <input type="text" placeholder="Buscar..." [ngModel]="gis.busquedaAntena()"
                (ngModelChange)="gis.busquedaAntena.set($event)" class="search-input">
            </div>
          </div>

          <!-- Grupo: Abonados -->
          <div class="subcapa-group">
            <button class="subcapa-item" [class.active]="isActive('abonados')"
              (click)="setDetalle('abonados')" [title]="gis.sidebarColapsado() ? 'Abonados' : ''">
              <i class="fas fa-user-check layer-icon" style="color: #00BFFF;"></i>
              <span *ngIf="!gis.sidebarColapsado()">Abonados</span>
            </button>
            <button class="add-item-btn" (click)="abrirModal('abonados')" *ngIf="!gis.sidebarColapsado()">+</button>
          </div>

          <!-- Grupo: Oficinas -->
          <div class="subcapa-group">
            <button class="subcapa-item" [class.active]="isActive('oficinas')"
              (click)="setDetalle('oficinas')" [title]="gis.sidebarColapsado() ? 'Oficinas Comerciales' : ''">
              <i class="fas fa-building layer-icon" style="color: #32CD32;"></i>
              <span *ngIf="!gis.sidebarColapsado()">Oficinas</span>
            </button>
            <button class="add-item-btn" (click)="abrirModal('oficinas')" *ngIf="!gis.sidebarColapsado()">+</button>
          </div>

          <!-- Grupo: Agentes -->
          <div class="subcapa-group">
            <button class="subcapa-item" [class.active]="isActive('agentes')"
              (click)="setDetalle('agentes')" [title]="gis.sidebarColapsado() ? 'Agentes Autorizados' : ''">
              <i class="fas fa-store layer-icon" style="color: #FF8C00;"></i>
              <span *ngIf="!gis.sidebarColapsado()">Agentes</span>
            </button>
            <button class="add-item-btn" (click)="abrirModal('agentes')" *ngIf="!gis.sidebarColapsado()">+</button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <button class="btn-collapse" (click)="gis.sidebarColapsado.set(!gis.sidebarColapsado())">
    <i class="fas" [class.fa-chevron-left]="!gis.sidebarColapsado()"
      [class.fa-chevron-right]="gis.sidebarColapsado()"></i>
    <span *ngIf="!gis.sidebarColapsado()">Cerrar Menú</span>
  </button>

  <button class="btn-logout" (click)="salir()">
    <i class="fas fa-sign-out-alt"></i>
    <span *ngIf="!gis.sidebarColapsado()">Cerrar Sesión</span>
  </button>

  <!-- Overlay del Modal -->
  <div class="modal-overlay" [class.active]="mostrarForm()">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h3>Agregar Nuevo</h3>
          <small class="text-blue">{{ tipoEdicion | titlecase }}</small>
        </div>
        <button class="close-x" (click)="mostrarForm.set(false)">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Estado</label>
            <ng-select [(ngModel)]="nuevoItem.estado" [items]="listaEstados" [clearable]="false" [searchable]="true"
              placeholder="Seleccione un estado" class="select-simple">
            </ng-select>
          </div>
          <div class="form-group">
            <label>Región</label>
            <input type="text" [value]="gis.obtenerRegion(nuevoItem.estado)" readonly placeholder="Se asigna solo">
          </div>
        </div>

        <ng-container *ngIf="tipoEdicion === 'antenas' || tipoEdicion === 'agentes' || tipoEdicion === 'oficinas'">
          <div class="form-row">
            <div class="form-group">
              <label>{{ tipoEdicion === 'agentes' ? 'Razón Social *' : 'Nombre *' }}</label>
              <input type="text" [(ngModel)]="nuevoItem.nombre"
                [placeholder]="tipoEdicion === 'agentes' ? 'Razón Social del Agente' : 'Nombre de la Antena/Oficina'"
                required>
            </div>
            <div class="form-group">
              <label>Dirección</label>
              <div class="input-with-action">
                <input type="text" [(ngModel)]="nuevoItem.direccion" placeholder="Ej: Av. Francisco de Miranda"
                  class="full-width-input">
                <button type="button" class="action-btn" (click)="guardar()" title="Validar ubicación">
                  <i class="fas fa-search-location"></i>
                </button>
              </div>
            </div>
          </div>
        </ng-container>

        <div class="form-group" *ngIf="tipoEdicion === 'antenas'">
          <div class="form-row">
            <div class="form-group">
              <label>Tecnología</label>
              <ng-select [(ngModel)]="nuevoItem.tecnologia" [items]="opcionesTecnologia" bindLabel="label"
                bindValue="value" [multiple]="true" [closeOnSelect]="false" [searchable]="false"
                class="custom-ng-select" placeholder="Seleccione..." appendTo="body"
                dropdownPanelClass="custom-dropdown-panel">

                <ng-template ng-header-tmp>
                  <div class="custom-option select-all-option" (click)="toggleAllTecnologias()">
                    <div class="custom-checkbox" [class.selected]="todasSeleccionadas"
                      [class.partial]="algunasSeleccionadas && !todasSeleccionadas">
                      <i class="fas fa-check" *ngIf="todasSeleccionadas"></i>
                      <i class="fas fa-minus" *ngIf="algunasSeleccionadas && !todasSeleccionadas"></i>
                    </div>
                    <span style="font-weight: 500; font-size: 14px;">Seleccionar Todo</span>
                  </div>
                </ng-template>

                <ng-template ng-option-tmp let-item="item" let-item$="item$" let-index="index">
                  <div class="custom-option" [class.active-row]="item$.selected">
                    <div class="custom-checkbox" [class.selected]="item$.selected">
                      <i class="fas fa-check" *ngIf="item$.selected"></i>
                    </div>
                    <span style="font-size: 14px; font-weight: 400;">{{item.label}}</span>
                  </div>
                </ng-template>
              </ng-select>
            </div>

            <div class="form-group">
              <label>Estado de Actividad</label>
              <ng-select [(ngModel)]="nuevoItem.actividad" [items]="listaActividad" bindLabel="label" bindValue="value"
                [clearable]="false" [searchable]="false" placeholder="Seleccione" class="select-simple">
              </ng-select>
            </div>
          </div>
        </div>

        <div class="form-group"
          *ngIf="tipoEdicion === 'antenas' || tipoEdicion === 'agentes' || tipoEdicion === 'oficinas'">
          <div class="form-row">
            <div class="form-group">
              <label>Longitud</label>
              <input type="number" [(ngModel)]="nuevoItem.longitud" placeholder="" step="any">
            </div>
            <div class="form-group">
              <label>Latitud</label>
              <input type="number" [(ngModel)]="nuevoItem.latitud" placeholder="" step="any">
            </div>
          </div>
        </div>

        <div *ngIf="tipoEdicion === 'abonados'" class="form-group">
          <label>Segmentación de Cartera</label>
          <ng-select [(ngModel)]="nuevoItem.segmentacion_elegida" class="select-simple" [clearable]="false"
            [searchable]="false" placeholder="Seleccione segmentación">
            <ng-option value="3G">3G</ng-option>
            <ng-option value="4G">4G</ng-option>
            <ng-option value="5G">5G</ng-option>
          </ng-select>
        </div>

        <div *ngIf="tipoEdicion === 'agentes'">
          <div class="form-row">
            <div class="form-group">
              <label>Código Dealer *</label>
              <input type="text" [(ngModel)]="nuevoItem.codigoDealer" placeholder="Ej: AA001" required>
            </div>
            <div class="form-group">
              <label>Clasificación *</label>
              <ng-select [(ngModel)]="nuevoItem.clasificacion" [items]="clasificaciones" [clearable]="false"
                [searchable]="false" placeholder="Seleccione..." class="select-simple" required>
              </ng-select>
            </div>
          </div>
        </div>

        <div *ngIf="tipoEdicion === 'abonados'" class="form-group">
          <label>Cantidad Total</label>
          <input type="number" [(ngModel)]="nuevoItem.cantidad" placeholder="Ej: 1500">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="mostrarForm.set(false)">Cancelar</button>
        <button class="btn-save" [disabled]="enviando" (click)="guardar()">
          <span *ngIf="!enviando">Guardar</span>
          <span *ngIf="enviando">...</span>
        </button>
      </div>
    </div>
  </div>
</div>
