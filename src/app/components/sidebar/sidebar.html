<div class="sidebar" [class.collapsed]="gis.sidebarColapsado()">
  <div class="sidebar-main-content">
    <div class="sidebar-header" [class.collapsed]="gis.sidebarColapsado()">
      <div class="brand" [class.collapsed]="gis.sidebarColapsado()">
        <div class="brand-icon">
          <i class="fas fa-map-marked-alt"></i>
        </div>
        <div class="brand-text" *ngIf="!gis.sidebarColapsado()">
          <strong>STERIÁ</strong>
        </div>
      </div>

      <button class="btn-toggle" (click)="gis.sidebarColapsado.set(!gis.sidebarColapsado())"
        [title]="gis.sidebarColapsado() ? 'Expandir Menú' : 'Colapsar Menú'">
        <i class="fas fa-bars layer-icon"></i>
      </button>
    </div>
    <hr class="header-divider">

    <div class="section-label" *ngIf="esAdmin && !gis.sidebarColapsado()">ADMIN</div>
    <button class="layer-item" *ngIf="esAdmin" routerLink="/usuarios" routerLinkActive="active"
      [title]="gis.sidebarColapsado() ? 'Gestión de Usuarios' : ''">
      <i class="fas fa-users layer-icon" style="color: #3240A5;"></i>
      <span *ngIf="!gis.sidebarColapsado()">Gestión de Usuarios</span>
    </button>

    <div class="section-label" *ngIf="!gis.sidebarColapsado()">MAPA</div>

    <button class="layer-item" routerLink="/mapa" routerLinkActive="active"
      [title]="gis.sidebarColapsado() ? 'Visualización General' : ''">
      <i class="fas fa-globe-americas layer-icon" style="color: #3240A5;"></i>
      <span *ngIf="!gis.sidebarColapsado()">Visualización General</span>
    </button>

    <!-- Botón de Buscador Global -->
    <button class="layer-item" (click)="abrirBuscador()" [title]="gis.sidebarColapsado() ? 'Buscador Global' : ''">
      <i class="fas fa-search layer-icon" style="color: #3240A5;"></i>
      <span *ngIf="!gis.sidebarColapsado()">Buscador Global</span>
    </button>

    <ng-container *ngIf="router.url === '/mapa'">
      <div class="section-label" *ngIf="!gis.sidebarColapsado()">SERVICIOS</div>
      <div class="layer-list">
        <button class="layer-item" [class.active]="gis.capasVisibles().electricidad" (click)="toggle('electricidad')"
          [title]="gis.sidebarColapsado() ? 'Red Eléctrica' : ''">
          <i class="fas fa-bolt layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Electricidad</span>
        </button>

        <button class="layer-item" [class.active]="gis.capasVisibles().vias" (click)="toggle('vias')"
          [title]="gis.sidebarColapsado() ? 'Vías y Calles' : ''">
          <i class="fas fa-road layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Vías</span>
        </button>
      </div>

      <div class="section-label" *ngIf="!gis.sidebarColapsado()">CONTROL DE CAPAS</div>
      <div class="layer-list">
        <button class="layer-item" [class.active]="gis.capasVisibles().cotas" (click)="toggle('cotas')"
          [title]="gis.sidebarColapsado() ? 'Cotas' : ''">
          <i class="fas fa-mountain layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Cotas</span>
        </button>

        <button class="layer-item" [class.active]="gis.capasVisibles().regiones" (click)="toggle('regiones')"
          [title]="gis.sidebarColapsado() ? 'Regiones' : ''">
          <i class="fas fa-layer-group layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Regiones</span>
        </button>

        <!-- Selección de elemento para Regiones -->
        <div class="subcapas-container mini" *ngIf="gis.capasVisibles().regiones">
          <div class="section-label-mini" *ngIf="!gis.sidebarColapsado()">MOSTRAR TOTAL DE:</div>
          <div class="tipo-selector-grid">
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleRegiones.includes('antenas')"
              (click)="setDetalleRegiones('antenas')" title="Radio Bases">
              <i class="fas fa-broadcast-tower layer-icon" style="color: #FF1493;"></i>
            </button>
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleRegiones.includes('abonados')"
              (click)="setDetalleRegiones('abonados')" title="Abonados">
              <i class="fas fa-user-check layer-icon" style="color: #00BFFF;"></i>
            </button>
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleRegiones.includes('oficinas')"
              (click)="setDetalleRegiones('oficinas')" title="Oficinas">
              <i class="fas fa-building layer-icon" style="color: #32CD32;"></i>
            </button>
            <button class="tipo-btn" [class.active]="gis.capasVisibles().detalleRegiones.includes('agentes')"
              (click)="setDetalleRegiones('agentes')" title="Agentes">
              <i class="fas fa-store layer-icon" style="color: #FF8C00;"></i>
            </button>
          </div>
        </div>

        <button class="layer-item" [class.active]="gis.capasVisibles().operaciones" (click)="toggle('operaciones')"
          [title]="gis.sidebarColapsado() ? 'Operaciones' : ''">
          <i class="fas fa-network-wired layer-icon" style="color: #3240A5;"></i>
          <span *ngIf="!gis.sidebarColapsado()">Operaciones</span>
        </button>

        <div class="subcapas-container mini" *ngIf="gis.capasVisibles().operaciones">
          <div class="section-label-with-btn" *ngIf="!gis.sidebarColapsado()">
            <span>ESTADOS / ELEMENTOS</span>
            <div class="add-item-btn-circle" (click)="abrirModal('ninguno')" title="Agregar Elemento">
              <i class="fas fa-plus"></i>
            </div>
          </div>

          <div class="tipo-selector-grid">
            <button class="tipo-btn" [class.active]="isActive('antenas')" (click)="setDetalle('antenas')"
              title="Antenas">
              <i class="fas fa-broadcast-tower layer-icon" style="color: #FF1493;"></i>
            </button>
            <button class="tipo-btn" [class.active]="isActive('abonados')" (click)="setDetalle('abonados')"
              title="Abonados">
              <i class="fas fa-user-check layer-icon" style="color: #00BFFF;"></i>
            </button>
            <button class="tipo-btn" [class.active]="isActive('oficinas')" (click)="setDetalle('oficinas')"
              title="Oficinas">
              <i class="fas fa-building layer-icon" style="color: #32CD32;"></i>
            </button>
            <button class="tipo-btn" [class.active]="isActive('agentes')" (click)="setDetalle('agentes')"
              title="Agentes">
              <i class="fas fa-store layer-icon" style="color: #FF8C00;"></i>
            </button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <button class="btn-logout" (click)="salir()">
    <i class="fas fa-sign-out-alt layer-icon"></i>
    <span *ngIf="!gis.sidebarColapsado()">Cerrar Sesión</span>
  </button>

  <!-- Modales -->
  <app-add-element [tipo]="tipoEdicion" [itemAEditar]="itemAEditar" [visible]="mostrarForm()"
    (onClose)="mostrarForm.set(false)" (onSaved)="onElementSaved()">
  </app-add-element>

  <app-search-modal [visible]="mostrarSearchModal()" [esAdmin]="esAdmin" (onClose)="mostrarSearchModal.set(false)"
    (onEdit)="onEditFromSearch($event)">
  </app-search-modal>
</div>
